<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Etch-A-Sketch</title>
</head>
<body>
    <h1>Etch-a-Sketch</h1>
    <p>Move the mouse over the grid to start painting!</p>
    <div class="button-container">
        <button id="resize-button">Resize Grid</button>
        <button id="random-color-button">Random Color(Off)</button>
        <button id="progressive-opacity-button">Progressive Opacity(Off)</button>
        <button id="clear-grid-button">Clear Grid</button>
    </div>
    <div id="container"></div>

    <script src="scripts/main.js"></script>
</body>
</html>
